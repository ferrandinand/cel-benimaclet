cloudConfig:
  secret: icccpi-managed-kubernetes-01-admin
clusterName: icccpi-cwh-dev
controlPlane:
  kamaji:
    apiServerResources:
      limits:
        cpu: 1200m
        memory: 2048Mi
      requests:
        cpu: 250m
        memory: 512Mi
    dataStoreName: icccpi-cwh-dev
kubernetesVersion: 1.32.11
managementCluster: uniqcloud-mgmt-cluster
nodeClasses:
  default:
    bootFromVolume: true
    flavor: cpu2-ram8-disk32
    image: ubuntu-2204-kube-v1.32.11
    sizeGiB: 50
nodePools:
  az1:
    class: default
    failureDomain: AZ1
    replicas: 2
  az2:
    class: default
    failureDomain: AZ2
    replicas: 2
  az3:
    class: default
    failureDomain: AZ3
    replicas: 1
